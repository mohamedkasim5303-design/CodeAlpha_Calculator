<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calculator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
    }

    .calculator{
      width:320px;
      background:#222;
      padding:20px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    .display{
      width:100%;
      height:70px;
      border:none;
      outline:none;
      background:#111;
      color:#fff;
      font-size:32px;
      text-align:right;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:65px;
      border:none;
      border-radius:12px;
      font-size:22px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    button:active{
      transform:scale(0.95);
    }

    .number{
      background:#333;
      color:white;
    }

    .operator{
      background:#ff9500;
      color:white;
    }

    .equal{
      background:#28a745;
      color:white;
      grid-column:span 2;
    }

    .clear{
      background:#dc3545;
      color:white;
    }

    .delete{
      background:#6c757d;
      color:white;
    }

    @media(max-width:400px){

      .calculator{
        width:95%;
      }

      button{
        height:55px;
        font-size:18px;
      }

      .display{
        font-size:26px;
      }

    }

  </style>
</head>

<body>

  <div class="calculator">

    <!-- DISPLAY SCREEN -->
    <input type="text" class="display" id="display" readonly>

    <!-- BUTTONS -->
    <div class="buttons">

      <button class="clear">C</button>
      <button class="delete">?</button>
      <button class="operator">%</button>
      <button class="operator">/</button>

      <button class="number">7</button>
      <button class="number">8</button>
      <button class="number">9</button>
      <button class="operator">*</button>

      <button class="number">4</button>
      <button class="number">5</button>
      <button class="number">6</button>
      <button class="operator">-</button>

      <button class="number">1</button>
      <button class="number">2</button>
      <button class="number">3</button>
      <button class="operator">+</button>

      <button class="number">0</button>
      <button class="number">.</button>
      <button class="equal">=</button>

    </div>

  </div>

  <script>

    const display = document.getElementById("display");

    const buttons = document.querySelectorAll("button");

    // HANDLE BUTTON CLICKS
    buttons.forEach(button => {

      button.addEventListener("click", () => {

        const value = button.textContent;

        // CLEAR SCREEN
        if(value === "C"){
          display.value = "";
        }

        // DELETE LAST CHARACTER
        else if(value === "?"){
          display.value = display.value.slice(0,-1);
        }

        // CALCULATE RESULT
        else if(value === "="){

          try{
            display.value = eval(display.value);
          }

          catch{
            display.value = "Error";
          }

        }

        // APPEND VALUES
        else{
          display.value += value;
        }

      });

    });

    // KEYBOARD SUPPORT
    document.addEventListener("keydown", (event) => {

      const key = event.key;

      // ALLOW NUMBERS & OPERATORS
      if(
        (key >= "0" && key <= "9") ||
        key === "+" ||
        key === "-" ||
        key === "*" ||
        key === "/" ||
        key === "." ||
        key === "%"
      ){
        display.value += key;
      }

      // ENTER KEY
      else if(key === "Enter"){

        try{
          display.value = eval(display.value);
        }

        catch{
          display.value = "Error";
        }

      }

      // BACKSPACE KEY
      else if(key === "Backspace"){
        display.value = display.value.slice(0,-1);
      }

      // ESC KEY TO CLEAR
      else if(key === "Escape"){
        display.value = "";
      }

    });

  </script>

</body>
</html>
